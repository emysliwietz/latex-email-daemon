services:
    latex-email-daemon:
        image: ghcr.io/emysliwietz/latex-email-daemon:latest
        container_name: latex-email-daemon
        restart: unless-stopped
        environment:
            - IMAP_SERVER=${IMAP_SERVER}
            - EMAIL_ACCOUNT=${EMAIL_ACCOUNT}
            - EMAIL_PASSWORD=${EMAIL_PASSWORD}
            - TARGET_ADDRESS=${TARGET_ADDRESS}
            - ALLOWED_SENDER_DOMAIN=${ALLOWED_SENDER_DOMAIN}
            - SMTP_SERVER=${SMTP_SERVER}
            - SMTP_PORT=${SMTP_PORT}
            - SMTP_SENDER_EMAIL=${SMTP_SENDER_EMAIL}
            - SMTP_SENDER_PASSWORD=${SMTP_SENDER_PASSWORD}
            - IDLE_TIMEOUT=${IDLE_TIMEOUT:-300}
            - EMAIL_BODY_TEXT="Im Anhang befindet sich die gewünschte PDF.
              Dies ist eine automatisch generierte Email. Beep. Boop."
            - STATE_FILE=data/last_seen_uid.txt
            - LATEX_TEMPLATE_FILE=templates/template.tex
        volumes:
            - /root/docker/email/daemon-data:/app/src/latex_email_daemon/data
            - /root/docker/email/template-data:/app/src/latex_email_daemon/templates
    latex-pdf-web:
        image: ghcr.io/emysliwietz/latex-email-daemon:latest
        container_name: latex-pdf-web
        restart: unless-stopped
        command: ["python", "web.py"]
        environment:
            - LATEX_TEMPLATE_DIR=templates
            - LATEX_TEMPLATE_FILE=templates/template.tex
            - WEB_HOST=0.0.0.0
            - WEB_PORT=5000
            - WEB_DEBUG=${WEB_DEBUG:-0}
        volumes:
            - /root/docker/email/template-data:/app/src/latex_email_daemon/templates
        # Uncomment for direct access on port 5000 as well:
        # ports:
        #     - "5000:5000"

    # Announces hostname "pdf" to Fritzbox via its own LAN IP (macvlan),
    # making http://pdf/ resolve on every device without any DNS config.
    # Config is written inline via entrypoint — no external file needed.
    pdf-alias:
        image: nginx:alpine
        container_name: pdf-alias
        hostname: pdf
        restart: unless-stopped
        depends_on:
            - latex-pdf-web
        # Write the config inline so no external file is needed on the host.
        entrypoint: >
            sh -c "printf 'server { listen 80; location / { proxy_pass http://latex-pdf-web:5000; proxy_set_header Host \$$host; proxy_read_timeout 120s; proxy_buffering off; } }\n'
            > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
        networks:
            default: {} # internal bridge — reaches latex-pdf-web by service name
            lan:
                ipv4_address: ${PDF_LAN_IP}

networks:
    default: {}

    lan:
        driver: macvlan
        driver_opts:
            # Find with: ip -br link show   (the interface with your LAN IP)
            parent: ${LAN_INTERFACE}
        ipam:
            config:
                # Find with: ip route show default
                # e.g. "default via 192.168.178.1 dev eth0" → gateway + interface
                # Subnet: ip -br addr show eth0 → 192.168.178.x/24 → 192.168.178.0/24
                - subnet: ${LAN_SUBNET}
                  gateway: ${LAN_GATEWAY}

volumes:
    daemon-data:
    template-data:
